name: build java_corretto

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 1,15 * *"
  push:
    branches:
      - main
    paths:
      - java-corretto/**

permissions:
  actions: read
  packages: write

concurrency:
  group: java-corretto-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  push:
    name: "java_${{ matrix.version }}_corretto"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - 8
          - 11
          - 17
          - 21
          - 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./java-corretto
          file: ./java-corretto/${{ matrix.version }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/minelat/pterodactyl-images:java_${{ matrix.version }}_corretto
